<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSK - Standardized Work</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="tsk">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <p class="brand-caption">Lean Manufacturing</p>
        <h1>Standardized Work</h1>
      </div>

      <nav class="menu">
        <a href="../index.html">Dashboard</a>
        <a href="observasi.html">Lembar Observasi</a>
        <a href="tskk.html">TSKK</a>
        <a href="tsk.html">TSK</a>
        <a href="tskp.html">TSKP</a>
        <a href="yamazumi.html">Yamazumi</a>
      </nav>

      <div class="sidebar-actions">
        <button id="exportJsonBtn" class="btn">Export JSON</button>
        <label class="btn file-btn" for="importJsonInput">
          Import JSON
          <input id="importJsonInput" type="file" accept=".json,application/json">
        </label>
        <button id="resetDataBtn" class="btn danger">Reset Data</button>
      </div>
    </aside>

    <main class="content">
      <header class="page-header">
        <h2>Tabel Standar Kerja (TSK)</h2>
        <p>Atur posisi mesin dan alur pergerakan operator dengan drag &amp; drop.</p>
      </header>

      <p id="globalMessage" class="message" aria-live="polite"></p>

      <section class="card">
        <div class="form-inline">
          <label>
            Pilih Observasi
            <select id="tskObservationSelect"></select>
          </label>
          <button id="addMachineBtn" class="btn">Tambah Mesin</button>
          <button id="autoArrangeBtn" class="btn ghost">Auto Arrange</button>
          <button id="saveTskLayoutBtn" class="btn primary">Simpan Layout</button>
        </div>
        <p class="helper-text">Tip: Drag kotak mesin untuk memindahkan posisi. Klik dua kali nama mesin untuk ubah nama.</p>

        <div id="tskLayoutArea" class="layout-stage">
          <svg id="tskPathSvg" class="path-layer" viewBox="0 0 1000 520" preserveAspectRatio="none"></svg>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/chart.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
