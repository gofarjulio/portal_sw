<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Standardized Work</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .hidden { display: none !important; }
        .spinner {
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col h-full shrink-0">
        <div class="p-5 border-b border-gray-700">
            <h1 class="text-xl font-bold tracking-wide">Lean Portal</h1>
            <p class="text-xs text-gray-400 mt-1 uppercase">Standardized Work</p>
        </div>
        <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-1" id="nav-menu">
            <a href="#" data-page="dashboard" class="flex items-center px-3 py-2.5 bg-gray-800 text-blue-400 rounded-md transition-colors nav-link">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Dashboard
            </a>
            <a href="#" data-page="observation" class="flex items-center px-3 py-2.5 text-gray-300 hover:bg-gray-800 hover:text-white rounded-md transition-colors nav-link">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                Lembar Observasi
            </a>
            <a href="#" data-page="yamazumi" class="flex items-center px-3 py-2.5 text-gray-300 hover:bg-gray-800 hover:text-white rounded-md transition-colors nav-link">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Yamazumi Chart
            </a>
            <!-- Sync Button -->
            <div class="mt-8 px-3 pt-6 border-t border-gray-700">
                <button id="btn-sync" class="w-full flex items-center justify-center space-x-2 bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded shadow">
                    <span id="sync-text">Simpan ke Server</span>
                    <div id="sync-spinner" class="spinner hidden"></div>
                </button>
                <div id="sync-status" class="text-xs text-center text-gray-400 mt-2">Belum tersinkron</div>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-gray-50 relative overflow-y-auto">
        
        <!-- PAGES -->
        
        <!-- Dashboard Page -->
        <div id="page-dashboard" class="page-container p-8">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800">Proyek Produksi</h2>
                    <p class="text-gray-500 mt-1">Daftar lini produksi Standardized Work</p>
                </div>
                <button id="btn-add-project" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded shadow-sm">
                    + Proyek Baru
                </button>
            </div>
            
            <div id="project-list" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Injected via JS -->
            </div>
        </div>

        <!-- Observation Page -->
        <div id="page-observation" class="page-container p-8 hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Lembar Observasi Waktu</h2>
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <div class="mb-4 flex space-x-4">
                    <select id="obs-project-select" class="border rounded px-4 py-2 w-1/3">
                        <option value="">Pilih Proyek / Lini...</option>
                    </select>
                </div>
                <!-- Logic for observation input -->
                <p class="text-gray-500 italic">Pilih proyek di atas untuk mulai memasukkan data observasi.</p>
            </div>
        </div>

        <!-- Yamazumi Page -->
        <div id="page-yamazumi" class="page-container p-8 hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Yamazumi Chart</h2>
            <div class="bg-white p-6 rounded-lg shadow border border-gray-200 h-96">
                <canvas id="yamazumiCanvas"></canvas>
            </div>
        </div>

    </main>

    <!-- App Logic -->
    <script src="js/app.js"></script>
</body>
</html>
